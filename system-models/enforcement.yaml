# =====================================================================
# planning_parent_gate.als — parent-rolls-up-children gate
# =====================================================================

# =====================================================================
# Parent-rollup gate lives at FINISH-time only (commit eaade69 moved
# it from next/pull-time to finished.py). Cross-queue scan added in
# commit bb79ed8. Tracked separately from the parent-CLAIM gate
# (next entry) — they enforce orthogonal halves of the convention
# "parent owns the subtree's lifecycle".
# =====================================================================

- id: parent_rolls_up_children_at_finish
  description: pm finished refuses to close a parent while any child (any queue) is still new/working — the rollup invariant at finish-time.
  models:
    - file: system-models/planning_parent_gate.als
      asserts:
        - ParentNotFinishedWhilePendingChild
        - SDoneChainRecursesToGrandchildren
        - CrossQueueParentNotFinishedWhilePendingChild
  code_gates:
    - file: skills/pm/scripts/finished.py
      must_call: children_settled
      must_exit: 14
    - file: skills/pm/scripts/store.py
      must_match: 'def children_settled'
      must_call: _find_children_global       # cross-queue scan
  skill_texts:
    - file: skills/pm/scripts/finished.py
      must_mention: ["children", "rollup"]
  tests: [g34_parent_unblocks_after_children_settle, g44_superseded_child_is_terminal_for_finish_gate, g56_parent_finish_blocked_while_children_pending, g57_parent_finish_succeeds_after_children_settle, g85_cross_queue_parent_finish_blocked_while_child_pending, g86_cross_queue_parent_finish_succeeds_after_child_settles]      # G85/G86: cross-queue finish gate

# =====================================================================
# Parent-CLAIM gate lives at next/pull/executing — a child can't
# start until its parent's lifecycle has begun (parent.status != new).
# Cross-queue gate added in commit c662a03 to close the asymmetry
# with the finish-time gate above.
# =====================================================================

- id: parent_claim_gate
  description: pm next/pull/executing refuse to surface or claim a child whose parent (any queue) is still in `new`.
  models:
    - file: system-models/planning_parent_gate.als
      asserts:
        - ChildBlockedUntilParentClaimed
        - ChildRunnableOnceParentClaimed
        - CrossQueueChildBlockedUntilParentClaimed
        - CrossQueueChildRunnableOnceParentClaimed
        - TopLevelTaskAlwaysRunnable
        - ChildlessNewTaskRunnable
        - NoSelfBlocking
  code_gates:
    # Same-queue selection gate (next/pull) — refuse to surface a
    # child whose parent.status is still `new`.
    - file: skills/pm/scripts/next.py
      must_call: parent_claimed
      must_match: 'task_status_by_record_sha'      # cross-queue fallback lookup
    - file: skills/pm/scripts/pull.py
      must_call: parent_claimed
      must_match: 'task_status_by_record_sha'      # cross-queue fallback lookup
    # Hard claim gate (executing) — exit 15 when parent.status == `new`,
    # including when parent lives on a different queue.
    - file: skills/pm/scripts/executing.py
      must_match: 'task_status_by_record_sha'      # cross-queue fallback lookup
      must_exit: 15
    # Helper definition (single source of truth for the cross-queue
    # parent-status lookup; callers above must use it).
    - file: skills/pm/scripts/store.py
      must_match: 'def task_status_by_record_sha'
  skill_texts:
    - file: skills/pm/scripts/next.py
      must_mention: ["parent", "lifecycle"]
    - file: skills/pm/scripts/executing.py
      must_mention: ["parent-claim", "15"]
  tests: [g33_parent_runnable_with_pending_children, g35_childless_task_still_runnable, g62_child_blocked_until_parent_claimed, g63_top_level_task_unaffected_by_parent_gate, g64_executing_refuses_child_with_unclaimed_parent, g89_cross_queue_child_blocked_until_parent_claimed, g90_cross_queue_child_runnable_once_parent_claimed] # G89/G90: cross-queue claim gate

# =====================================================================
# planning_replan_with_parent_gate.als — cross-feature composition
# =====================================================================

- id: replan_parent_gate_consistency
  description: after any replan action, parent-gate predicate stays consistent (no inconsistent runnable+pending-child state).
  models:
    - file: system-models/planning_replan_with_parent_gate.als
      asserts:
        - P1_ParentGateHoldsAfterReplan
        - P2_CascadeDownDoesNotCrossParentBoundary
        - P4_ReplanTargetRunnableWhenUnblocked
        - P5_SiblingChainOrderingPreservedAfterMidChainReplan
  code_gates:
    - file: skills/pm/scripts/replan.py
      must_call: reset_in_place
    # Rollup gate lives at finish-time (commit eaade69 moved it from
    # next.py). Composition with replan is: a replanned chain that
    # eventually finishes still has the rollup invariant enforced by
    # finished.py.
    - file: skills/pm/scripts/finished.py
      must_call: children_settled
  skill_texts:
    - file: skills/pm/scripts/replan.py
      must_mention: ["cascade", "parent"]
  tests: [g7_replan_modes, g33_parent_runnable_with_pending_children, g34_parent_unblocks_after_children_settle, g37_replan_cascade_down]

- id: replan_cascade_down_parents
  description: --cascade-down-parents resets terminal rollup ancestors via parentTask chain (closes StaleRollupWitness).
  models:
    - file: system-models/planning_replan_with_parent_gate.als
      asserts:
        - P6_CascadeDownParentsClosesStaleRollup
        - P7_CascadeDownParentsScoped
  code_gates:
    - file: skills/pm/scripts/replan.py
      must_call: find_parent_chain_ancestors
      must_match: 'cascade.down.parents|cascade_down_parents'
  skill_texts:
    - file: skills/pm/scripts/replan.py
      must_mention: ["cascade-down-parents", "rollup"]
  tests: [g40_replan_cascade_down_parents, g41_cascade_down_parents_two_level_chain, g42_cascade_down_parents_no_parent_safe, g43_cascade_down_parents_skips_inflight_parent]
